name: desktop-dmg

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build DMG
        run: npm run desktop:pack:dmg

      - name: Resolve app version
        id: version
        run: echo "version=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Stage DMG artifacts
        run: |
          mkdir -p dist-desktop
          cp "$HOME/.bender-dist-desktop"/*.dmg dist-desktop/
          ls -la dist-desktop/

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: bender-desktop-v${{ steps.version.outputs.version }}-dmg
          path: dist-desktop/*.dmg
          if-no-files-found: error

      - name: Publish release assets (tag builds)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-desktop/*.dmg
          generate_release_notes: true
